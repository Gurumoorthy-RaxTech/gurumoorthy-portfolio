      explain:"A transaction (<code>BEGIN TRANSACTION ... COMMIT / ROLLBACK</code>) groups multiple statements so they succeed or fail TOGETHER. ACID: <strong>A</strong>tomicity (all-or-nothing), <strong>C</strong>onsistency (valid state before/after), <strong>I</strong>solation (concurrent transactions don't interfere), <strong>D</strong>urability (committed changes survive a crash).",

      code:"-- BEFORE (violates 3NF - ClassTeacherName depends on ClassName, not StudentId):\n-- Student(StudentId, StudentName, ClassName, ClassTeacherName)\n\n-- AFTER (normalized):\n-- Student(StudentId, StudentName, ClassId)\n-- Class(ClassId, ClassName, ClassTeacherName)\n-- Changing a teacher now updates ONE row in Class, not every student row" },
    { name:"20. Query Performance &amp; Execution Plans",
      movie:"🎬 Thani Oruvan — before committing to a plan of action, Mithran always reviews the FULL STRATEGY MAP of how an operation will actually unfold, step by step, to spot inefficiencies before they cost him. An execution plan is that exact map for how the database will actually run your query.",
      explain:"An execution plan shows HOW the database engine will actually execute a query — whether it uses an index seek (fast) or a full table scan (slow), the join algorithm chosen, and the estimated cost of each step. Common performance killers to watch for: missing indexes on JOIN/WHERE columns, wrapping an indexed column in a function (<code>WHERE YEAR(AdmissionDate) = 2025</code> disables the index — rewrite as a range comparison instead), and <code>SELECT *</code> pulling unnecessary columns/data.",
      zen:"If a ZenCampus attendance report suddenly becomes slow as data grows, checking the execution plan (`SET SHOWPLAN_ALL ON` or the graphical plan in SQL Server Management Studio) reveals whether it's doing a full table scan on `AttendanceLog` — the fix is usually adding the right index rather than rewriting application code.",
      code:"-- BAD: disables any index on AdmissionDate\nSELECT * FROM Student WHERE YEAR(AdmissionDate) = 2025;\n\n-- GOOD: index-friendly range comparison\nSELECT StudentId, StudentName FROM Student\nWHERE AdmissionDate &gt;= '2025-01-01' AND AdmissionDate &lt; '2026-01-01';" }
  ]
}
];

// ============ 50 INTERVIEW QUESTIONS ============
const questions = [
  {level:"Basic", q:"What is the difference between SQL and a Relational Database Management System (RDBMS)?", a:"SQL (Structured Query Language) is the language used to define, query, and manipulate data. An RDBMS (SQL Server, MySQL, PostgreSQL) is the actual software system that stores data in tables and implements SQL to interact with it."},
  {level:"Basic", q:"What is the difference between WHERE and HAVING?", a:"WHERE filters individual rows BEFORE any grouping/aggregation happens and cannot reference aggregate functions. HAVING filters GROUPS AFTER GROUP BY has been applied and can reference aggregate results like COUNT() or SUM()."},
  {level:"Basic", q:"What is a primary key?", a:"A column (or combination of columns) that uniquely identifies each row in a table. It's implicitly NOT NULL and unique, and every table should have exactly one."},
  {level:"Basic", q:"What is a foreign key and what problem does it solve?", a:"A column referencing the primary key of another table, enforcing referential integrity — the database prevents inserting a value that doesn't exist in the referenced table, and by default blocks deleting a referenced row that still has dependents."},
  {level:"Basic", q:"What is the difference between DELETE, TRUNCATE, and DROP?", a:"DELETE removes specific rows (can use WHERE, can be rolled back, fires triggers, slower). TRUNCATE removes ALL rows at once (faster, minimal logging, resets identity counters, cannot use WHERE). DROP removes the entire table structure itself, including its data and schema definition."},
  {level:"Basic", q:"What is the difference between CHAR and VARCHAR?", a:"CHAR(n) is fixed-length, always storing exactly n characters (padded with spaces if shorter). VARCHAR(n) is variable-length, storing only the actual characters used plus a small length overhead — generally preferred unless the data truly has a fixed, predictable length."},
  {level:"Basic", q:"What does the DISTINCT keyword do?", a:"Removes duplicate rows from the result set, comparing across ALL selected columns together (not per-column) to determine uniqueness."},
  {level:"Basic", q:"What is a NULL value and how is it different from zero or an empty string?", a:"NULL represents the ABSENCE of a value / unknown — it is not equal to 0, an empty string, or even another NULL. Any comparison with NULL using = or != returns unknown (effectively false), which is why IS NULL / IS NOT NULL must be used instead."},
  {level:"Basic", q:"What is the difference between UNION and UNION ALL?", a:"UNION combines results from two queries and removes duplicate rows (requires an extra sort/distinct step, slower). UNION ALL combines results and KEEPS duplicates, which is faster since no deduplication work is needed — use UNION ALL whenever duplicates are acceptable or impossible."},
  {level:"Basic", q:"What is an alias in SQL?", a:"A temporary name given to a column or table using AS (often optional for columns), improving readability especially with joins or computed columns, e.g. SELECT s.StudentName AS Name FROM Student s."},
  {level:"Basic", q:"What is the correct logical order of SQL clauses in a SELECT statement?", a:"FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY. Note this differs from the WRITTEN order (SELECT is written first but evaluated after WHERE/GROUP BY/HAVING) — this is why you can't reference a SELECT column alias inside WHERE."},
  {level:"Intermediate", q:"What is the difference between INNER JOIN and LEFT JOIN?", a:"INNER JOIN returns only rows with a match in BOTH tables. LEFT JOIN returns ALL rows from the left table regardless of a match, filling unmatched right-table columns with NULL."},
  {level:"Intermediate", q:"What is a correlated subquery and why can it be slow?", a:"A subquery that references a column from the OUTER query, meaning it must logically re-execute once for EACH row processed by the outer query — potentially O(n×m) instead of O(n+m), unlike an independent (non-correlated) subquery that runs once."},
  {level:"Intermediate", q:"What is the difference between a clustered index and a non-clustered index?", a:"A clustered index determines the PHYSICAL storage order of the table's rows on disk — a table can have only ONE. A non-clustered index is a separate structure with pointers back to the actual rows — a table can have MANY."},
  {level:"Intermediate", q:"What is normalization and why is it used?", a:"The process of organizing tables to eliminate redundant data and prevent update/insert/delete anomalies, by ensuring each piece of information is stored in exactly one place (1NF, 2NF, 3NF being the common levels applied in practice)."},
  {level:"Intermediate", q:"What is denormalization and when would you use it?", a:"Deliberately introducing some redundancy (duplicating data across tables) to improve READ performance by avoiding expensive joins, at the cost of extra complexity keeping the duplicated data in sync — used in reporting/analytics-heavy systems where read speed matters more than write simplicity."},
  {level:"Intermediate", q:"What is a Common Table Expression (CTE) and how does it differ from a subquery?", a:"A CTE (WITH clause) defines a named, temporary result set that can be referenced (even multiple times) within the same query — improving readability over deeply nested nested subqueries, and uniquely enabling RECURSIVE queries for hierarchical data, which plain subqueries cannot do."},
  {level:"Intermediate", q:"What are window functions and how do they differ from GROUP BY aggregates?", a:"Window functions (ROW_NUMBER, RANK, SUM() OVER(...)) compute a value across a set of related rows WITHOUT collapsing them into a single summary row — each original row is preserved in the output, unlike GROUP BY which reduces multiple rows into one row per group."},
  {level:"Intermediate", q:"What is the difference between RANK(), DENSE_RANK(), and ROW_NUMBER()?", a:"ROW_NUMBER() assigns a unique sequential number to every row regardless of ties. RANK() gives tied rows the same rank but LEAVES A GAP in the numbering afterward (1,1,3). DENSE_RANK() gives tied rows the same rank with NO gap (1,1,2)."},
  {level:"Intermediate", q:"What is a view and what are its main benefits?", a:"A saved, named query that behaves like a virtual table. Benefits: simplifies repeated complex joins, provides a security/abstraction layer (restricting visible columns/rows), and centralizes query logic so it's defined once and reused everywhere."},
  {level:"Intermediate", q:"What is the difference between a stored procedure and a function in SQL Server?", a:"A stored procedure can perform actions (INSERT/UPDATE/DELETE), return multiple result sets, and cannot be directly used inside a SELECT statement. A function must return a single value or table, generally cannot modify data (in most implementations), and CAN be used inline within a query, e.g. in a SELECT or WHERE clause."},
  {level:"Intermediate", q:"What is SQL injection and how do parameterized queries prevent it?", a:"SQL injection is when untrusted user input is concatenated directly into a SQL string, letting an attacker inject their own malicious SQL logic. Parameterized queries (or stored procedures with typed parameters) send the user input separately from the SQL command structure, so it's always treated as pure DATA, never as executable SQL code."},
  {level:"Advanced", q:"What is the difference between OLTP and OLAP systems?", a:"OLTP (Online Transaction Processing) systems handle many small, fast read/write transactions (like ZenCampus's day-to-day fee/attendance updates) with a normalized schema. OLAP (Online Analytical Processing) systems handle large, complex analytical queries over historical data, often using a denormalized star/snowflake schema optimized for aggregation and reporting."},
  {level:"Advanced", q:"What is a deadlock in a database and how can it be avoided?", a:"A deadlock occurs when two transactions each hold a lock the other needs, and both wait indefinitely for the other to release it. Avoided by always acquiring locks/accessing tables in a CONSISTENT order across all transactions, keeping transactions short, and using appropriate isolation levels."},
  {level:"Advanced", q:"What are the different transaction isolation levels and what problem does each solve?", a:"READ UNCOMMITTED (allows dirty reads), READ COMMITTED (default in most DBs, prevents dirty reads), REPEATABLE READ (prevents non-repeatable reads — a row read twice in the same transaction stays consistent), SERIALIZABLE (strictest, prevents phantom reads too, at the cost of concurrency/performance)."},
  {level:"Advanced", q:"What is the difference between a table scan and an index seek in an execution plan?", a:"A table scan reads EVERY row in the table to find matches — O(n), slow for large tables. An index seek uses an index's sorted structure to jump DIRECTLY to matching rows — roughly O(log n), which is the goal for any frequently-run query on a large table."},
  {level:"Advanced", q:"Why can wrapping an indexed column in a function in the WHERE clause hurt performance?", a:"Applying a function to an indexed column (e.g. WHERE YEAR(AdmissionDate) = 2025) forces the database to compute that function for EVERY row before it can compare, making the index on that column unusable — it falls back to a full table scan. Rewriting as a sargable range comparison (AdmissionDate &gt;= '2025-01-01' AND AdmissionDate &lt; '2026-01-01') lets the index be used again."},
  {level:"Advanced", q:"What is a covering index?", a:"An index that includes ALL the columns needed to satisfy a query (either as key columns or INCLUDE columns), letting the database answer the query entirely from the index itself without needing to look up the actual table rows — significantly faster for read-heavy queries."},
  {level:"Advanced", q:"What is the N+1 query problem and how do you avoid it?", a:"A performance anti-pattern where code runs 1 query to fetch a list, then N additional queries (one per item) to fetch related data for each — instead of one efficient JOIN or a single batched query. Avoided by using a JOIN, an IN clause, or an ORM's explicit eager-loading feature to fetch everything needed in one or two round trips instead of N+1."},
  {level:"Advanced", q:"What is the difference between optimistic and pessimistic concurrency control?", a:"Pessimistic locking acquires a lock on data as soon as it's read, blocking other transactions from modifying it until released — safe but can hurt concurrency. Optimistic concurrency allows concurrent reads/writes and only checks for conflicts (e.g. via a version/timestamp column) at COMMIT time, rejecting the update if the data changed since it was read — better throughput when conflicts are rare."},
  {level:"Advanced", q:"How would you design the schema for a ZenCampus-style Bill and Payment history feature to ensure data integrity?", a:"A Bill table (one row per fee due, with a status column) and a separate PaymentHistory table (one row per actual payment transaction, foreign-keyed to Bill), rather than overwriting a single 'amount paid' field — this preserves a full audit trail, supports partial payments naturally, and lets you reconstruct the exact payment timeline for any bill later."},
  {level:"Advanced", q:"What is a recursive CTE and what problem does it solve?", a:"A CTE that references itself, used to traverse hierarchical or graph-like data (an org chart, a category tree, a bill-of-materials) in a single query — it has an 'anchor' member (the base case) UNION ALL'd with a 'recursive' member that repeatedly joins back to the CTE itself until no more rows are produced."},
  {level:"Advanced", q:"What is the difference between a hash join, a merge join, and a nested loop join, and when does the query optimizer pick each?", a:"Nested loop join: for each row in the outer table, scan the inner table (efficient for small tables or when one side has a matching index). Hash join: builds an in-memory hash table from the smaller input, then probes it with the larger input (efficient for large, unsorted, unindexed datasets). Merge join: requires both inputs pre-sorted on the join key, then merges them in one linear pass (very efficient when data is already sorted, e.g. via an index). The query optimizer picks based on estimated table sizes, available indexes, and existing sort order."}
];

// ============ RENDER: INTERVIEW Q&A ============
const listEl = document.getElementById('qaList');
const filtersEl = document.getElementById('filters');
const searchBox = document.getElementById('searchBox');
const visibleCountEl = document.getElementById('visibleCount');
const levels = ["All", "Basic", "Intermediate", "Advanced"];
let activeLevel = "All";

function renderFilters(){
  filtersEl.innerHTML = levels.map(lvl =>
    `<button class="filter-btn ${lvl===activeLevel?'active':''}" data-level="${lvl}">${lvl}</button>`
  ).join('');
  filtersEl.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeLevel = btn.dataset.level;
      renderFilters();
      renderQAList();
    });
  });
}

function renderQAList(){
  const searchTerm = searchBox.value.trim().toLowerCase();
  const filtered = questions
    .map((item, idx)=>({...item, idx}))
    .filter(item => activeLevel==="All" || item.level===activeLevel)
    .filter(item => !searchTerm || item.q.toLowerCase().includes(searchTerm) || item.a.toLowerCase().includes(searchTerm));

  visibleCountEl.textContent = filtered.length;

  listEl.innerHTML = filtered.map(item => `
    <div class="qa" data-idx="${item.idx}">
      <div class="q">
        <span><span class="num">Q${item.idx+1}.</span>${item.q}</span>
        <span style="display:flex; align-items:center; gap:10px;">
          <span class="tag">${item.level}</span>
          <span class="toggle-icon">+</span>
        </span>
      </div>
      <div class="a">${item.a}</div>
    </div>
  `).join('');

  listEl.querySelectorAll('.q').forEach(qEl=>{
    qEl.addEventListener('click', ()=> qEl.parentElement.classList.toggle('open'));
  });
}
searchBox.addEventListener('input', renderQAList);
renderFilters();
renderQAList();

    <span class="num">${t.name.split('.')[0]}</span>
    <span>${t.name.split('. ')[1].replace(/&amp;/g,'&')} <em style="color:var(--muted); font-size:0.8rem;">(Day ${t.day})</em></span>
  </div>
`).join('');
checklistEl.querySelectorAll('.check-item').forEach(item=>{

      if(target){

});
