  .day-title{ color:var(--accent); font-size:1.3rem; margin-bottom:14px; border-left:4px solid var(--accent); padding-left:10px; }

  .q{ padding:16px 18px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-weight:600; gap:12px; }

  .q .num{ color:var(--accent); margin-right:8px; }
  .q .tag{ font-size:0.7rem; font-weight:400; padding:2px 8px; border-radius:10px; background:#0b1220; color:var(--accent); white-space:nowrap; }
  .q .tag2{ font-size:0.7rem; font-weight:600; padding:2px 8px; border-radius:10px; background:#0b1220; white-space:nowrap; }
  .tag-html{ color:#f97316; }
  .tag-css{ color:#38bdf8; }

  .qa.open .a{ max-height:1300px; padding:0 18px 18px; border-top:1px solid #334155; }

  .a pre{ display:block; padding:12px; overflow-x:auto; white-space:pre-wrap; margin:10px 0; }
  .movie-ref{ background:#3b1e5e; color:#e9d5ff; padding:10px 12px; border-radius:8px; margin:8px 0; font-size:0.9rem; }
  .zen-ref{ background:#0e3b2e; color:#bbf7d0; padding:10px 12px; border-radius:8px; margin:8px 0; font-size:0.9rem; }
  .toggle-icon{ transition:transform .25s; color:var(--accent); font-size:1.1rem; }

  .count{ color:var(--accent); font-weight:600; }

  .check-item{ background:var(--card); border:1px solid #334155; border-radius:8px; padding:12px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; }

  .check-item .num{ color:var(--muted); font-size:0.8rem; min-width:20px; }

  footer{ text-align:center; padding:20px; color:var(--muted); font-size:0.85rem; }

// ============ 50 INTERVIEW QUESTIONS (HTML + CSS) ============
const questions = [
  {level:"Basic", type:"HTML", q:"What is the difference between HTML elements and tags?", a:"A tag is the markup itself, e.g. <code>&lt;p&gt;</code> and <code>&lt;/p&gt;</code>. An element is the tag PLUS its content, e.g. <code>&lt;p&gt;Hello&lt;/p&gt;</code> is the full element."},
  {level:"Basic", type:"HTML", q:"What is the difference between block-level and inline elements?", a:"Block-level elements (<code>div, p, section, h1</code>) start on a new line and take full available width. Inline elements (<code>span, a, strong</code>) flow within a line and only take up as much width as their content."},
  {level:"Basic", type:"HTML", q:"What is semantic HTML and why does it matter?", a:"Semantic HTML uses tags that describe their MEANING (<code>&lt;header&gt;, &lt;nav&gt;, &lt;article&gt;</code>) instead of generic <code>&lt;div&gt;</code>s. It improves SEO, accessibility (screen readers), and code maintainability."},
  {level:"Basic", type:"HTML", q:"What is the purpose of the alt attribute on images?", a:"Provides alternate text describing the image for screen readers (accessibility) and displays if the image fails to load. Also used by search engines for image SEO."},
  {level:"Basic", type:"HTML", q:"What is the difference between id and class attributes?", a:"<code>id</code> must be unique per page and is used for a single specific element (also usable as a CSS selector or JS hook). <code>class</code> can be reused across multiple elements for shared styling/behavior."},
  {level:"Basic", type:"HTML", q:"What are void/self-closing elements? Give examples.", a:"Elements with no closing tag and no content, e.g. <code>&lt;img&gt;, &lt;br&gt;, &lt;input&gt;, &lt;hr&gt;, &lt;meta&gt;, &lt;link&gt;</code>."},
  {level:"Basic", type:"HTML", q:"What is the difference between GET and POST form methods?", a:"<code>GET</code> appends form data to the URL (visible, bookmarkable, limited length, used for retrieving data). <code>POST</code> sends data in the request body (hidden from URL, no length limit, used for submitting/changing data)."},
  {level:"Basic", type:"HTML", q:"What is the DOCTYPE declaration for?", a:"<code>&lt;!DOCTYPE html&gt;</code> tells the browser to render the page in standards mode (HTML5) rather than quirks mode, ensuring consistent rendering across browsers."},
  {level:"Basic", type:"CSS", q:"What is the CSS Box Model?", a:"Every element is a box composed of, from inside out: <code>content → padding → border → margin</code>. Total visible size = content + padding + border (+ margin for spacing outside)."},
  {level:"Basic", type:"CSS", q:"What is the difference between inline, internal, and external CSS?", a:"Inline: <code>style=\"...\"</code> directly on an element (highest priority, hardest to maintain). Internal: <code>&lt;style&gt;</code> block in the <code>&lt;head&gt;</code>. External: a linked <code>.css</code> file via <code>&lt;link&gt;</code> — best for reuse and caching."},
  {level:"Basic", type:"CSS", q:"What is the difference between class and ID selectors in terms of specificity?", a:"ID selectors (<code>#id</code>) have higher specificity than class selectors (<code>.class</code>), meaning ID rules override class rules when both target the same element, regardless of order."},
  {level:"Basic", type:"CSS", q:"What is the difference between margin and padding?", a:"<code>padding</code> is space INSIDE an element's border (between content and border). <code>margin</code> is space OUTSIDE the border, separating the element from its neighbors."},
  {level:"Basic", type:"CSS", q:"What are the different position values in CSS?", a:"<code>static</code> (default, normal flow), <code>relative</code> (offset from its own position), <code>absolute</code> (positioned relative to nearest positioned ancestor), <code>fixed</code> (relative to viewport), <code>sticky</code> (relative until a scroll threshold, then fixed)."},
  {level:"Basic", type:"CSS", q:"What is the difference between visibility:hidden and display:none?", a:"<code>display:none</code> removes the element entirely from layout (no space reserved). <code>visibility:hidden</code> hides the element visually but still reserves its layout space."},
  {level:"Intermediate", type:"HTML", q:"What is the difference between localStorage-backed forms and server-rendered forms?", a:"Server-rendered forms (like ASP.NET MVC's Razor forms) submit and reload the full page via POST unless intercepted by JS/AJAX. Client-side JS can capture the submit event, POST via fetch, and update the DOM without a full reload — a common ZenCampus pattern for smoother UX."},
  {level:"Intermediate", type:"HTML", q:"What are ARIA attributes and when should you use them?", a:"Accessible Rich Internet Application attributes (<code>role, aria-label, aria-hidden, aria-live</code>) improve accessibility for assistive technologies, especially for custom interactive components (like a JS-built dropdown) that native HTML doesn't cover. Rule of thumb: prefer semantic HTML first, add ARIA only when necessary."},
  {level:"Intermediate", type:"HTML", q:"What is the difference between defer and async on a script tag?", a:"Both let the script download without blocking HTML parsing. <code>async</code> executes the script as soon as it's downloaded (order not guaranteed). <code>defer</code> executes scripts in order, only after the HTML is fully parsed — generally preferred for scripts that touch the DOM."},
  {level:"Intermediate", type:"HTML", q:"What is the viewport meta tag and why is it required for responsive design?", a:"<code>&lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"&gt;</code> tells mobile browsers to render the page at the device's actual width instead of a default desktop-width canvas, which is required for media queries to work correctly on phones."},
  {level:"Intermediate", type:"HTML", q:"What is the difference between srcset and the src attribute on an img tag?", a:"<code>src</code> gives one fixed image URL. <code>srcset</code> provides multiple image sources at different resolutions/widths, letting the browser pick the most efficient one for the current device and screen density — improving load performance."},
  {level:"Intermediate", type:"CSS", q:"Explain Flexbox: main axis vs cross axis.", a:"In <code>display:flex</code>, the main axis follows <code>flex-direction</code> (row by default = horizontal). <code>justify-content</code> aligns items along the main axis; <code>align-items</code> aligns items along the cross axis (perpendicular to main)."},
  {level:"Intermediate", type:"CSS", q:"What is the difference between Flexbox and Grid, and when would you use each?", a:"Flexbox is 1-dimensional (a single row OR column) — best for aligning items in a line (navbar, button group). Grid is 2-dimensional (rows AND columns together) — best for full page/section layouts (dashboards, card grids)."},
  {level:"Intermediate", type:"CSS", q:"What is CSS specificity and how is it calculated?", a:"Specificity ranks which rule wins when multiple rules target the same element. Roughly: inline styles (1000) &gt; IDs (100) &gt; classes/attributes/pseudo-classes (10) &gt; elements/pseudo-elements (1). Higher specificity wins regardless of source order; equal specificity is resolved by which rule comes last."},
  {level:"Intermediate", type:"CSS", q:"What is the difference between em and rem units?", a:"<code>em</code> is relative to the font-size of its OWN element (compounding when nested). <code>rem</code> is always relative to the ROOT (<code>html</code>) font-size, making it more predictable for consistent spacing across a codebase."},
  {level:"Intermediate", type:"CSS", q:"What are media queries and how do you write a mobile-first one?", a:"<code>@media (condition) { rules }</code> applies CSS conditionally based on viewport size/features. Mobile-first means writing base styles for small screens first, then using <code>min-width</code> media queries to progressively add styles for larger screens: <pre>.card { width: 100%; }\n@media (min-width: 768px) { .card { width: 50%; } }</pre>"},
  {level:"Intermediate", type:"CSS", q:"What is the difference between relative, absolute, and fixed positioning in terms of their containing block?", a:"<code>relative</code> positions relative to its own normal position. <code>absolute</code> positions relative to the nearest ANCESTOR with a non-static position (or the initial containing block if none exists). <code>fixed</code> positions relative to the browser viewport and ignores scrolling."},
  {level:"Intermediate", type:"CSS", q:"What is a CSS pseudo-element and how is it different from a pseudo-class?", a:"Pseudo-classes (<code>:hover, :nth-child</code>) target an element's STATE or position. Pseudo-elements (<code>::before, ::after</code>) target a virtual sub-part of an element not present in the actual DOM, often used to insert decorative content via <code>content:</code>."},
  {level:"Intermediate", type:"CSS", q:"What is the CSS cascade and how does source order affect it?", a:"The cascade determines the final applied style by combining: 1) importance (<code>!important</code>), 2) specificity, 3) source order (later rules win ties). Understanding this order prevents confusing 'why isn't my CSS applying' bugs."},
  {level:"Intermediate", type:"CSS", q:"What is the difference between inline-block and block display?", a:"<code>block</code> takes full width and starts on a new line. <code>inline-block</code> flows inline with surrounding content (like inline) but still respects width/height/margin/padding (like block) — useful for button-like elements sitting side by side."},
  {level:"Advanced", type:"HTML", q:"What is the difference between the DOM and HTML source code?", a:"HTML source is the static text file sent by the server. The DOM is the browser's live, in-memory tree representation of that HTML after parsing — and it can be dynamically modified by JavaScript, diverging from the original source at any time."},
  {level:"Advanced", type:"HTML", q:"What is Shadow DOM?", a:"An encapsulated DOM subtree attached to an element, whose internal styles and markup are isolated from the main document's CSS/JS — the foundation of Web Components, preventing style leakage in either direction."},
  {level:"Advanced", type:"HTML", q:"How does the browser handle render-blocking resources like CSS and JS?", a:"CSS in <code>&lt;head&gt;</code> blocks rendering until fully downloaded and parsed (to avoid a flash of unstyled content). Synchronous <code>&lt;script&gt;</code> tags block HTML parsing entirely at their position — which is why scripts are placed at the end of <code>&lt;body&gt;</code> or given <code>defer</code>/<code>async</code>."},
  {level:"Advanced", type:"HTML", q:"What is Critical Rendering Path?", a:"The sequence of steps the browser takes to convert HTML/CSS/JS into pixels on screen: parse HTML → build DOM → parse CSS → build CSSOM → combine into Render Tree → Layout (geometry) → Paint (pixels). Optimizing this path (minifying CSS, deferring JS) improves perceived load speed."},
  {level:"Advanced", type:"CSS", q:"What is a stacking context and what creates one?", a:"An independent layering hierarchy for <code>z-index</code>. Created by: a positioned element with a <code>z-index</code> value, <code>opacity &lt; 1</code>, <code>transform</code>, <code>filter</code>, or <code>will-change</code>. Nested z-index values only compete WITHIN their own stacking context, which is why a very high z-index sometimes still fails to appear on top."},
  {level:"Advanced", type:"CSS", q:"What is the difference between CSS Grid's fr unit and percentage widths?", a:"<code>fr</code> (fraction unit) distributes remaining available space proportionally AFTER fixed-size tracks and gaps are accounted for. Percentages are calculated purely from the container's total width, ignoring gaps — <code>fr</code> is generally more predictable for flexible grid layouts."},
  {level:"Advanced", type:"CSS", q:"What is the purpose of the will-change property?", a:"A performance hint telling the browser to optimize (e.g. promote to its own GPU layer) for an upcoming change to a property like <code>transform</code> or <code>opacity</code>, reducing jank during animations. Should be used sparingly — overuse consumes excessive GPU memory."},
  {level:"Advanced", type:"CSS", q:"How does CSS containment (contain property) improve performance?", a:"<code>contain: layout | paint | size | content</code> tells the browser that an element's internals don't affect the outside layout/paint, letting the browser skip recalculating the rest of the page when that element changes — useful for isolating large dynamic tables/widgets."},
  {level:"Advanced", type:"CSS", q:"What is the difference between CSS Grid's implicit and explicit grids?", a:"The explicit grid is defined via <code>grid-template-columns</code>/<code>rows</code>. The implicit grid is auto-generated by the browser for extra items that don't fit the explicit definition, sized via <code>grid-auto-rows</code>/<code>grid-auto-columns</code>."},
  {level:"Advanced", type:"CSS", q:"What are CSS logical properties and why are they useful?", a:"Properties like <code>margin-inline-start</code> instead of <code>margin-left</code> adapt automatically to text direction (LTR/RTL) and writing mode, making styles work correctly for internationalized apps without duplicating rules per language direction."},
  {level:"Advanced", type:"CSS", q:"What is the difference between CSS variables (custom properties) and preprocessor variables (like Sass)?", a:"Sass variables are compiled away at BUILD time — static, no runtime access. CSS custom properties (<code>--var</code>) are LIVE in the browser, can be read/changed via JavaScript at runtime, inherit through the DOM, and enable dynamic theming (e.g. dark mode toggling) without recompiling."},
  {level:"Advanced", type:"CSS", q:"How would you build a responsive fee-dues table that turns into stacked cards on mobile without duplicating the HTML?", a:"Use a single semantic <code>&lt;table&gt;</code>, then apply a media query below a breakpoint that overrides table display roles: <code>display:block</code> on <code>table, tr, td</code>, hide <code>&lt;thead&gt;</code>, and use <code>::before { content: attr(data-label); }</code> on each <code>&lt;td&gt;</code> to show its column label — achieving a card-like stacked layout from the same markup."},
  {level:"Advanced", type:"CSS", q:"What causes layout thrashing and how do you avoid it?", a:"Layout thrashing happens when JS repeatedly reads a layout property (like <code>offsetHeight</code>) then writes a style, forcing the browser to recalculate layout synchronously on every iteration inside a loop. Avoid it by batching all reads first, then all writes, or using <code>requestAnimationFrame</code>."},
  {level:"Advanced", type:"CSS", q:"What is the difference between CSS transitions and CSS animations?", a:"Transitions animate a property smoothly between two states triggered by a change (like <code>:hover</code>) — simple, one-directional. Animations (<code>@keyframes</code>) define multiple steps/percentages, can loop infinitely, and don't require a state change to start."}
];

// ============ COVERAGE CHECKLIST ============
const coverageTopics = guideDays.flatMap(day => day.topics.map(t => ({ name: t.name, day: day.day })));

// ============ RENDER: TABS ============
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

// ============ RENDER: GUIDE ============
const guideListEl = document.getElementById('guideList');
guideListEl.innerHTML = guideDays.map(day => `
  <div class="day-block" id="day-${day.day}">
    <h2 class="day-title">${day.title}</h2>
    ${day.topics.map((t) => `
      <div class="qa" id="topic-${t.name.split('.')[0].trim()}">
        <div class="q">
          <span>${t.name}</span>
          <span class="toggle-icon">+</span>
        </div>
        <div class="a">
          <div class="movie-ref">${t.movie}</div>
          <p>${t.explain}</p>
          <pre>${t.code}</pre>
          <div class="zen-ref"><strong>ZenCampus use case:</strong> ${t.zen}</div>
        </div>
      </div>
    `).join('')}
  </div>
`).join('');
guideListEl.querySelectorAll('.q').forEach(qEl=>{
  qEl.addEventListener('click', ()=> qEl.parentElement.classList.toggle('open'));
});

// ============ RENDER: INTERVIEW Q&A ============
const listEl = document.getElementById('qaList');
const filtersEl = document.getElementById('filters');
const searchBox = document.getElementById('searchBox');
const visibleCountEl = document.getElementById('visibleCount');
const levels = ["All", "HTML", "CSS", "Basic", "Intermediate", "Advanced"];
let activeLevel = "All";

function matchesFilter(item){
  if(activeLevel==="All") return true;
  if(activeLevel==="HTML" || activeLevel==="CSS") return item.type===activeLevel;
  return item.level===activeLevel;
}

function renderFilters(){
  filtersEl.innerHTML = levels.map(lvl =>
    `<button class="filter-btn ${lvl===activeLevel?'active':''}" data-level="${lvl}">${lvl}</button>`
  ).join('');
  filtersEl.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeLevel = btn.dataset.level;
      renderFilters();
      renderQAList();
    });
  });
}

function renderQAList(){
  const searchTerm = searchBox.value.trim().toLowerCase();
  const filtered = questions
    .map((item, idx)=>({...item, idx}))
    .filter(matchesFilter)
    .filter(item => !searchTerm || item.q.toLowerCase().includes(searchTerm) || item.a.toLowerCase().includes(searchTerm));

  visibleCountEl.textContent = filtered.length;

  listEl.innerHTML = filtered.map(item => `
    <div class="qa" data-idx="${item.idx}">
      <div class="q">
        <span><span class="num">Q${item.idx+1}.</span>${item.q}</span>
        <span style="display:flex; align-items:center; gap:8px;">
          <span class="tag2 ${item.type==='HTML'?'tag-html':'tag-css'}">${item.type}</span>
          <span class="tag">${item.level}</span>
          <span class="toggle-icon">+</span>
        </span>
      </div>
      <div class="a">${item.a}</div>
    </div>
  `).join('');

  listEl.querySelectorAll('.q').forEach(qEl=>{
    qEl.addEventListener('click', ()=> qEl.parentElement.classList.toggle('open'));
  });
}
searchBox.addEventListener('input', renderQAList);
renderFilters();
renderQAList();

// ============ RENDER: COVERAGE CHECKLIST ============
const checklistEl = document.getElementById('checklist');
checklistEl.innerHTML = coverageTopics.map((t) => `
  <div class="check-item" data-target="topic-${t.name.split('.')[0].trim()}" data-day="${t.day}">
    <span class="badge">✅</span>
    <span class="num">${t.name.split('.')[0]}</span>
    <span>${t.name.split('. ')[1].replace(/&amp;/g,'&')} <em style="color:var(--muted); font-size:0.8rem;">(Day ${t.day})</em></span>
  </div>
`).join('');
checklistEl.querySelectorAll('.check-item').forEach(item=>{
  item.addEventListener('click', ()=>{
    document.querySelector('.tab-btn[data-tab="guide"]').click();
    setTimeout(()=>{
      const target = document.getElementById(item.dataset.target);
      if(target){
        target.classList.add('open');
        target.scrollIntoView({behavior:'smooth', block:'start'});
      }
    }, 50);
  });
});
</script>
